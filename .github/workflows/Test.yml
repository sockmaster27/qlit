name: Test

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    test:
        name: Run tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - run: sudo apt-get update && sudo apt-get install -y mesa-utils
            - uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true
            - name: Install dependencies
              run: uv sync --locked
            - name: Run tests
              run: uv run pytest
