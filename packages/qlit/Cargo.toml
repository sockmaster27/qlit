[package]
name = "qlit"
version = "0.1.0"
license = "MPL-2.0"
description = "Strong exact simulation of Clifford+T quantum circuits"
edition = "2024"

[features]
# default = ["gpu"]
gpu = ["pollster"]

[dependencies]
num-complex = "0.4.6"
rand = { version = "0.9.4", features = ["small_rng"] }
rayon = "1.12.0"
pollster = { version = "0.4.0", optional = true }
# wgpu = { version = "29.0.3", optional = true }

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "bench"
harness = false
